name: Tests

on:
  pull_request:

jobs:
  unit-tests:
    uses: canonical/operator-workflows/.github/workflows/test.yaml@main
    secrets: inherit
    permissions:
      pull-requests: write
    with:
      self-hosted-runner: false
      with-uv: true
      working-directory: dovecot-charm
      runs-on-base: ubuntu-24.04
      python-version: 3.12
