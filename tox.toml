skipsdist = true
skip_missing_interpreters = true
envlist = [ "lint", "unit", "static", "coverage-report" ]
requires = [ "tox>=4.21" ]
no_package = true

[env_run_base]
passenv = [ "PYTHONPATH", "CHARM_BUILD_DIR", "MODEL_SETTINGS" ]
runner = "uv-venv-lock-runner"

[env_run_base.setenv]
PYTHONPATH = "{toxinidir}:{toxinidir}/lib:{[vars]src_path}"
PYTHONBREAKPOINT = "ipdb.set_trace"
PY_COLORS = "1"

[env.fmt]
description = "Apply coding style standards to all charms"
allowlist_externals = [ "tox" ]
commands = [
  [ "tox", "-c", "{toxinidir}/dovecot-charm/tox.toml", "-e", "fmt", { replace = "posargs", extend = true } ],
  [ "tox", "-c", "{toxinidir}/opendkim-operator/tox.toml", "-e", "fmt", { replace = "posargs", extend = true } ],
  [ "tox", "-c", "{toxinidir}/postfix-relay-operator/tox.ini", "-e", "fmt", { replace = "posargs", extend = true } ],
  [ "tox", "-c", "{toxinidir}/postfix-relay-configurator-operator/tox.ini", "-e", "fmt", { replace = "posargs", extend = true } ],
]
dependency_groups = [ "fmt" ]

[env.lint]
description = "Run lint checks for all charms"
allowlist_externals = [ "tox" ]
commands = [
  [ "tox", "-c", "{toxinidir}/dovecot-charm/tox.toml", "-e", "lint", { replace = "posargs", extend = true } ],
  [ "tox", "-c", "{toxinidir}/opendkim-operator/tox.toml", "-e", "lint", { replace = "posargs", extend = true } ],
  [ "tox", "-c", "{toxinidir}/postfix-relay-operator/tox.ini", "-e", "lint", { replace = "posargs", extend = true } ],
  [ "tox", "-c", "{toxinidir}/postfix-relay-configurator-operator/tox.ini", "-e", "lint", { replace = "posargs", extend = true } ],
]
dependency_groups = [ "lint" ]

[env.unit]
description = "Run all charm unit tests"
allowlist_externals = [ "tox" ]
commands = [
  [ "tox", "-c", "{toxinidir}/dovecot-charm/tox.toml", "-e", "unit", { replace = "posargs", extend = true } ],
  [ "tox", "-c", "{toxinidir}/opendkim-operator/tox.toml", "-e", "unit", { replace = "posargs", extend = true } ],
  [ "tox", "-c", "{toxinidir}/postfix-relay-operator/tox.ini", "-e", "unit", { replace = "posargs", extend = true } ],
  [ "tox", "-c", "{toxinidir}/postfix-relay-configurator-operator/tox.ini", "-e", "unit", { replace = "posargs", extend = true } ],
]
dependency_groups = [ "unit" ]

[env.coverage-report]
description = "Create coverage reports for all charms"
allowlist_externals = [ "tox" ]
commands = [
  [ "tox", "-c", "{toxinidir}/dovecot-charm/tox.toml", "-e", "coverage-report", { replace = "posargs", extend = true } ],
  [ "tox", "-c", "{toxinidir}/opendkim-operator/tox.toml", "-e", "coverage-report", { replace = "posargs", extend = true } ],
  [ "tox", "-c", "{toxinidir}/postfix-relay-operator/tox.ini", "-e", "coverage-report", { replace = "posargs", extend = true } ],
  [ "tox", "-c", "{toxinidir}/postfix-relay-configurator-operator/tox.ini", "-e", "coverage-report", { replace = "posargs", extend = true } ],
]
dependency_groups = [ "coverage-report" ]

[env.static]
description = "Run static analysis tests for all charms"
allowlist_externals = [ "tox" ]
commands = [
  [ "tox", "-c", "{toxinidir}/dovecot-charm/tox.toml", "-e", "static", { replace = "posargs", extend = true } ],
  [ "tox", "-c", "{toxinidir}/opendkim-operator/tox.toml", "-e", "static", { replace = "posargs", extend = true } ],
  [ "tox", "-c", "{toxinidir}/postfix-relay-operator/tox.ini", "-e", "static", { replace = "posargs", extend = true } ],
  [ "tox", "-c", "{toxinidir}/postfix-relay-configurator-operator/tox.ini", "-e", "static", { replace = "posargs", extend = true } ],
]
dependency_groups = [ "static" ]

