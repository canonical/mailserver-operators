version_schema: 2

changes:
- title: Added COS observability integration with Grafana dashboard, Prometheus and Loki alert rules
  author: javierdelapuente
  type: major
  description: Added Canonical Observability Stack (COS) integration via the cos-agent library. Includes a Grafana dashboard with service status, IMAP/POP3 session counts, and authentication rate panels; Prometheus alert rules for exporter availability, high authentication failure rate, and mail storage capacity; and Loki log-based alert rules for authentication failure spikes, fatal errors, out-of-memory conditions, stale dsync replication, and Postfix deferred queue growth.
  urls:
    pr:
      - "https://github.com/canonical/mailserver-operators/pull/18"
    related_doc:
    related_issue:
  visibility: public
  highlight: true
