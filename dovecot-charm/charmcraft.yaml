type: charm
base: ubuntu@24.04

platforms:
  amd64:

name: dovecot-charm

summary: Dovecot IMAP/POP3 mail server charm

description: |
  Deploys and configures Dovecot as an IMAP/POP3 mail server.

parts:
  charm:
    source: .
    plugin: uv
    build-snaps:
    - astral-uv
  dump:
    plugin: dump
    source: .
    stage:
    - templates

storage:
  mail-data:
    type: block
    description: |
      LUKS encrypted storage for mail data. Encryption is managed by the charm
      using the key supplied via the luks-key secret config option.
    multiple:
      range: "1"

peers:
  replicas:
    interface: replicas

config:
  options:
    mailname:
      description: |
        The fully qualified domain name (FQDN) or hostname for this mail server.
        Used to identify outgoing mail and should match your server's hostname.
      default: ""
      type: string
    manage-luks:
      description: |
        Enable automatic LUKS encryption management for attached block storage.
        When enabled, the charm will format the storage with LUKS using the key
        supplied via luks-key, create an ext4 filesystem, and manage mounting
        and fstab entries. Requires luks-key to be set.
      default: false
      type: boolean
    luks-key:
      description: |
        Juju secret ID containing the LUKS encryption key for block storage.
        The secret must have a field named "key" whose value is used as the
        LUKS passphrase. Required when manage-luks is true.
        Example: juju add-secret my-luks-key key=<passphrase>
      default: ""
      type: secret
    postmaster-address:
      description: |
        Email address of the postmaster or mail system administrator.
        Used as the sender for system-generated messages and bounce notifications.
      default: ""
      type: string
    primary-unit:
      description: |
        The primary unit in a replicated charm deployment (e.g., 'dovecot-charm/0').
        Only the primary unit receives incoming mail; replicas are read-only.
      default: ""
      type: string
    sync-schedule:
      description: |
        Cron schedule for syncing mail from primary to secondary units.
        Format: standard cron expression (e.g., "*/30 * * * *" for every 30 minutes).
      default: "*/30 * * * *"
      type: string

actions:
  clear-queue:
    description: Forcibly remove messages from the Postfix mail queue.
    params:
      queue:
        type: string
        description: The queue to clear (deferred or all).
        default: deferred
        enum: [deferred, all]
