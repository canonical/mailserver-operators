# This file configures Charmcraft.
# See https://juju.is/docs/sdk/charmcraft-config for guidance.

type: charm
base: ubuntu@24.04

platforms:
  amd64:

charm-libs:
  - lib: operator-libs-linux.apt
    version: "0"

name: dovecot-charm

summary: Dovecot IMAP/POP3 mail server charm

description: |
  Deploys and configures Dovecot as an IMAP/POP3 mail server.
  Intended for Canonical IS team use.

parts:
  charm:
    source: .
    plugin: uv
    build-snaps:
    - astral-uv
  dump:
    plugin: dump
    source: .
    stage:
    - templates

peers:
  replicas:
    interface: replicas

config:
  options:
    cron-mailto:
      description: Mail address to send cronjobs output to
      default: ""
      type: string
    mailname:
      description: Mail server mailname
      default: ""
      type: string
    postmaster-address:
      description: Postmaster email address
      default: ""
      type: string
    primary-unit:
      description: Primary unit
      default: ""
      type: string
    sync-schedule:
      description: |
        Cron schedule for syncing mail to secondary unit.
        Format: "*/30 * * * *" (every 30 minutes)
      default: "*/30 * * * *"
      type: string
    manage-luks:
      description: Whether the charm manages LUKS encryption on mail-data storage
      type: boolean
      default: true

actions:
  clear-queue:
    description: Forcibly remove messages from the Postfix mail queue.
    params:
      queue:
        type: string
        description: The queue to clear (deferred or all).
        default: deferred
        enum: [deferred, all]
  gdpr-archive:
    description: Archive a user's mailbox to a compressed backup for long-term retention.
    params:
      username:
        type: string
        description: The username whose mailbox to archive.
      compress:
        type: boolean
        default: true
        description: Whether to compress the archive as tar.gz.
    required: [username]
  gdpr-delete:
    description: Permanently delete a user's mailbox (GDPR right to erasure).
    params:
      username:
        type: string
        description: The username whose mailbox to delete.
      confirm:
        type: boolean
        default: false
        description: Must be set to true to proceed with deletion.
    required: [username, confirm]
  gdpr-takeout:
    description: Export a user's mail data in a portable format (GDPR data portability).
    params:
      username:
        type: string
        description: The username whose data to export.
      format:
        type: string
        default: maildir
        description: Export format (maildir or mbox).
        enum: [maildir, mbox]
    required: [username]
  force-sync:
    description: Manually trigger synchronization of mail to the secondary unit.
