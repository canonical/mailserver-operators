type: charm
base: ubuntu@24.04

platforms:
  amd64:

charm-libs:
  - lib: tls-certificates-interface.tls_certificates
    version: "4"
  - lib: grafana-agent.cos_agent
    version: "0"

name: dovecot-charm

summary: Dovecot IMAP/POP3 mail server charm

description: |
  Deploys and configures Dovecot as an IMAP/POP3 mail server.

parts:
  charm:
    source: .
    plugin: uv
    build-snaps:
    - astral-uv
  dump:
    plugin: dump
    source: .
    stage:
    - templates
    - src

storage:
  mail-data:
    type: block
    description: |
      LUKS encrypted storage for mail data. Encryption is automatically configured
      using a keyfile (/etc/dovecot-charm.key) generated by the charm.
    multiple:
      range: "1"

peers:
  replicas:
    interface: replicas

requires:
  certificates:
    interface: tls-certificates

provides:
  cos-agent:
    interface: cos_agent

config:
  options:
    mailname:
      description: |
        The fully qualified domain name (FQDN) or hostname for this mail server.
        Used to identify outgoing mail and should match your server's hostname.
      default: ""
      type: string
    postmaster-address:
      description: |
        Email address of the postmaster or mail system administrator.
        Used as the sender for system-generated messages and bounce notifications.
      default: ""
      type: string
    primary-unit:
      description: |
        The primary unit in a replicated charm deployment (e.g., 'dovecot-charm/0').
        Only the primary unit receives incoming mail; replicas are read-only.
      default: ""
      type: string
    sync-schedule:
      description: |
        Cron schedule for syncing mail from primary to secondary units.
        Format: standard cron expression (e.g., "*/30 * * * *" for every 30 minutes).
      default: "*/30 * * * *"
      type: string

actions:
  clear-queue:
    description: Forcibly remove messages from the Postfix mail queue.
    params:
      queue:
        type: string
        description: The queue to clear (deferred or all).
        default: deferred
        enum: [deferred, all]
  force-sync:
    description: Manually trigger synchronization of mail to the secondary unit.
  gdpr-archive:
    description: Archive a user's mailbox to a compressed backup for long-term retention.
    params:
      username:
        type: string
        description: The username whose mailbox to archive.
      compress:
        type: boolean
        default: true
        description: Whether to compress the archive as tar.gz.
    required: [username]
  gdpr-delete:
    description: Permanently delete a user's mailbox (GDPR right to erasure).
    params:
      username:
        type: string
        description: The username whose mailbox to delete.
      confirm:
        type: boolean
        default: false
        description: Must be set to true to proceed with deletion.
    required: [username, confirm]
  gdpr-takeout:
    description: Export a user's mail data in a portable format (GDPR data portability).
    params:
      username:
        type: string
        description: The username whose data to export.
      format:
        type: string
        default: maildir
        description: Export format (maildir or mbox).
        enum: [maildir, mbox]
    required: [username]
